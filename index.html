<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuscaFarma</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: white;
  padding: 12px 15px;
  display: flex;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.logo {
  color: #2ecc71;
  font-size: 20px;
  font-weight: bold;
}

.local {
  font-size: 14px;
  color: gray;
}

.banner {
  height: 120px;
  background: linear-gradient(90deg, #2ecc71, #27ae60);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.container {
  padding: 15px;
}

.search-box {
  background: white;
  border-radius: 30px;
  display: flex;
  padding: 12px;
  margin-top: -20px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

.search-box input {
  flex: 1;
  border: none;
  font-size: 16px;
}

.search-box button {
  background: #2ecc71;
  border: none;
  color: white;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  transition: transform 0.1s;
}

/* 🔥 efeito de clique */
.search-box button:active {
  transform: scale(0.9);
}

/* RESULTADOS */
.card {
  background: white;
  border-radius: 14px;
  margin-top: 12px;
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.card img {
  width: 70px;
  height: 70px;
  object-fit: contain;
}

.info {
  flex: 1;
}

.price {
  color: #27ae60;
  font-weight: bold;
  font-size: 18px;
}

.badge {
  background: linear-gradient(90deg, #ff4757, #ff6b81);
  color: white;
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 12px;
  margin-top: 5px;
  display: inline-block;
}

.btn {
  background: #2ecc71;
  color: white;
  padding: 8px 10px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 13px;
  transition: transform 0.1s;
}

/* 🔥 efeito botão comprar */
.btn:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<header>
  <div class="logo">BuscaFarma</div>
  <div class="local">📍 Iguaba Grande</div>
</header>

<div class="banner">
  Encontre o melhor preço 💊
</div>

<div class="container">

  <div class="search-box">
    <input type="text" id="search" placeholder="Digite o nome do remédio...">
    <button id="btnBuscar">🔍</button>
  </div>

  <div id="resultados"></div>

</div>

<script>
const produtos = [

  // DIPIRONA
  {nome:"Dipirona 500mg", preco:5.99, farmacia:"Farmácia Central", img:"dipirona-500mg-com-10-comprimidos-4720aabb2f.jpg"},
  {nome:"Dipirona 500mg", preco:6.49, farmacia:"Drogaria Saúde", img:"dipirona-500mg-com-10-comprimidos-4720aabb2f.jpg"},
  {nome:"Dipirona 500mg", preco:4.99, farmacia:"Farmácia Popular", img:"dipirona-500mg-com-10-comprimidos-4720aabb2f.jpg"},

  // DORFLEX
  {nome:"Dorflex", preco:12.99, farmacia:"Farmácia Central", img:"https://images.unsplash.com/photo-1588776814546-ec7e64d1c8c6?w=300"},
  {nome:"Dorflex", preco:11.50, farmacia:"Drogaria Saúde", img:"https://images.unsplash.com/photo-1588776814546-ec7e64d1c8c6?w=300"},
  {nome:"Dorflex", preco:13.20, farmacia:"Farmácia Popular", img:"https://images.unsplash.com/photo-1588776814546-ec7e64d1c8c6?w=300"},

  // PARACETAMOL
  {nome:"Paracetamol 750mg", preco:6.99, farmacia:"Farmácia Central", img:"paracetamol.jpeg"},
  {nome:"Paracetamol 750mg", preco:5.90, farmacia:"Drogaria Saúde", img:"paracetamol.jpeg"},
  {nome:"Paracetamol 750mg", preco:7.50, farmacia:"Farmácia Popular", img:"paracetamol.jpeg"}
];

function buscar(){
  const termo = document.getElementById("search").value.toLowerCase();
  const resultados = document.getElementById("resultados");

  const filtrados = produtos
    .filter(p => p.nome.toLowerCase().includes(termo))
    .sort((a,b) => a.preco - b.preco);

  resultados.innerHTML = "";

  // 🔥 mensagem quando não encontra
  if(filtrados.length === 0){
    resultados.innerHTML = `
      <p style="text-align:center;color:gray;margin-top:20px;">
        😕 Nenhum resultado encontrado
      </p>
    `;
    return;
  }

  filtrados.forEach((p, index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.img}" onerror="this.src='https://via.placeholder.com/100'">
      <div class="info">
        <strong>${p.nome}</strong>
${index === 0 ? '<div class="badge">🔥 Melhor preço</div>' : ''}
        <div class="price">R$ ${p.preco.toFixed(2)}</div>
        <small>${p.farmacia}</small>
      </div>
      <a class="btn" target="_blank"
        href="https://wa.me/?text=Olá, quero ${p.nome}">
        Comprar
      </a>
    `;

    resultados.appendChild(card);
  });
}

document.getElementById("search").addEventListener("input", buscar);
document.getElementById("btnBuscar").addEventListener("click", buscar);

// 🔥 carrega automático ao abrir
buscar();
</script>

</body>
</html>
