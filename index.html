<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuscaFarma</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: white;
  padding: 12px 15px;
  display: flex;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.logo {
  color: #2ecc71;
  font-size: 20px;
  font-weight: bold;
}

.local {
  font-size: 14px;
  color: gray;
}

.banner {
  height: 120px;
  background: linear-gradient(90deg, #2ecc71, #27ae60);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.container {
  padding: 15px;
}

.search-box {
  background: white;
  border-radius: 30px;
  display: flex;
  padding: 12px;
  margin-top: -20px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

.search-box input {
  flex: 1;
  border: none;
  font-size: 16px;
}

.search-box button {
  background: #2ecc71;
  border: none;
  color: white;
  border-radius: 50%;
  width: 40px;
  height: 40px;
}

.card {
  background: white;
  border-radius: 14px;
  margin-top: 12px;
  padding: 12px;
  display: flex;
  gap: 12px;
  align-items: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.card img {
  width: 70px;
  height: 70px;
  object-fit: contain;
}

.info {
  flex: 1;
}

.price {
  color: #27ae60;
  font-weight: bold;
  font-size: 18px;
  margin-top: 5px;
}

/* 🔥 BADGES CORRIGIDOS */
.badge, .patrocinado {
  display: inline-block;
  width: fit-content;
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 12px;
  margin-top: 6px;
}

/* Melhor preço */
.badge {
  background: #ff4757;
  color: white;
}

/* Patrocinado */
.patrocinado {
  background: #f1c40f;
  color: white;
  font-weight: normal;
}

.btn {
  background: #2ecc71;
  color: white;
  padding: 8px 10px;
  border-radius: 8px;
  text-decoration: none;
  font-size: 13px;
}

.painel {
  background: #111;
  color: #0f0;
  padding: 10px;
  font-size: 12px;
  margin: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  <div class="logo">BuscaFarma</div>
  <div class="local">📍 Iguaba Grande</div>
</header>

<div class="banner">
  Encontre o melhor preço 💊
</div>

<div class="container">

  <div class="search-box">
    <input type="text" id="search" placeholder="Digite o nome do remédio...">
    <button id="btnBuscar">🔍</button>
  </div>

  <div id="resultados"></div>

</div>

<div class="painel" id="painelAdmin" style="display:none;">
  <strong>📊 Painel Admin</strong><br>
  <div id="cliques"></div>
</div>

<script>
const produtos = [

  {nome:"Dipirona 500mg", preco:5.99, farmacia:"Farmácia Central", img:"dipirona.jpg", patrocinado:true},
  {nome:"Dipirona 500mg", preco:6.49, farmacia:"Drogaria Saúde", img:"dipirona.jpg"},
  {nome:"Dipirona 500mg", preco:4.99, farmacia:"Farmácia Popular", img:"dipirona.jpg"},

  {nome:"Dorflex", preco:12.99, farmacia:"Farmácia Central", img:"dorflex.jpg"},
  {nome:"Dorflex", preco:11.50, farmacia:"Drogaria Saúde", img:"dorflex.jpg", patrocinado:true},
  {nome:"Dorflex", preco:13.20, farmacia:"Farmácia Popular", img:"dorflex.jpg"},

  {nome:"Paracetamol 750mg", preco:6.99, farmacia:"Farmácia Central", img:"paracetamol.jpg"},
  {nome:"Paracetamol 750mg", preco:5.90, farmacia:"Drogaria Saúde", img:"paracetamol.jpg"},
  {nome:"Paracetamol 750mg", preco:7.50, farmacia:"Farmácia Popular", img:"paracetamol.jpg"}
];

let cliques = JSON.parse(localStorage.getItem("cliques")) || {};

function registrarClique(produto){
  cliques[produto] = (cliques[produto] || 0) + 1;
  localStorage.setItem("cliques", JSON.stringify(cliques));
  atualizarPainel();
}

function atualizarPainel(){
  const div = document.getElementById("cliques");
  div.innerHTML = "";
  for(let p in cliques){
    div.innerHTML += `${p}: ${cliques[p]} cliques<br>`;
  }
}

function buscar(){
  const termo = document.getElementById("search").value.toLowerCase();
  const resultados = document.getElementById("resultados");

  let filtrados = produtos.filter(p => p.nome.toLowerCase().includes(termo));

  const patrocinados = filtrados.filter(p => p.patrocinado);
  const normais = filtrados
    .filter(p => !p.patrocinado)
    .sort((a,b) => a.preco - b.preco);

  filtrados = [...patrocinados, ...normais];

  resultados.innerHTML = "";

  if(filtrados.length === 0){
    resultados.innerHTML = `<p style="text-align:center;color:gray;">😕 Nenhum resultado encontrado</p>`;
    return;
  }

  filtrados.forEach((p, index) => {
    const card = document.createElement("div");
    card.className = "card";

    const isMelhorPreco = !p.patrocinado && index === patrocinados.length;

    card.innerHTML = `
      <img src="${p.img}" onerror="this.src='https://via.placeholder.com/100'">
      <div class="info">
        <strong>${p.nome}</strong><br>
        ${p.patrocinado ? '<div class="patrocinado">⭐Patrocinado</div>' : ''}
        ${isMelhorPreco ? '<div class="badge">🔥 Melhor preço</div>' : ''}
        <div class="price">R$ ${p.preco.toFixed(2)}</div>
        <small>${p.farmacia}</small>
      </div>
      <a class="btn" target="_blank"
        onclick="registrarClique('${p.nome}')"
        href="https://wa.me/?text=Olá, quero ${p.nome}">
        Comprar
      </a>
    `;

    resultados.appendChild(card);
  });
}

if (window.location.search.includes("admin")) {
  document.getElementById("painelAdmin").style.display = "block";
  atualizarPainel();
}

document.getElementById("search").addEventListener("input", buscar);
document.getElementById("btnBuscar").addEventListener("click", buscar);

buscar();
</script>

</body>
</html>
