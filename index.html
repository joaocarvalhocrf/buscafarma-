<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuscaFarma</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

/* HEADER NOVO */
header {
  background: white;
  padding: 12px 15px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.logo {
  color: #2ecc71;
  font-size: 20px;
  font-weight: bold;
}

.local {
  font-size: 14px;
  color: gray;
}

/* BANNER */
.banner {
  width: 100%;
  height: 140px;
  background: linear-gradient(90deg, #2ecc71, #27ae60);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 20px;
}

.container {
  padding: 15px;
}

/* BUSCA PREMIUM */
.search-box {
  background: white;
  border-radius: 30px;
  display: flex;
  padding: 12px 15px;
  margin-top: -25px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
  align-items: center;
}

.search-box input {
  flex: 1;
  border: none;
  padding: 8px;
  font-size: 15px;
}

.search-box button {
  background: #2ecc71;
  color: white;
  border: none;
  border-radius: 50%;
  width: 40px;
  height: 40px;
}

/* CATEGORIAS */
.categorias {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  margin-top: 15px;
}

.categoria {
  background: white;
  padding: 10px 15px;
  border-radius: 20px;
  white-space: nowrap;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  font-size: 14px;
}

/* CARDS */
.card {
  background: white;
  border-radius: 16px;
  margin-bottom: 15px;
  overflow: hidden;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
  transform: scale(1.02);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: contain;
  background: white;
  padding: 10px;
}

.info {
  padding: 10px;
}

.price {
  color: #27ae60;
  font-weight: bold;
  font-size: 20px;
}

.badge {
  background: #27ae60;
  color: white;
  padding: 4px 8px;
  border-radius: 8px;
  font-size: 12px;
  display: inline-block;
  margin-top: 5px;
}

.btn {
  background: #2ecc71;
  color: white;
  padding: 10px;
  border-radius: 10px;
  display: block;
  text-align: center;
  margin-top: 10px;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  <div class="logo">BuscaFarma</div>
  <div class="local">📍 Iguaba Grande</div>
</header>

<div class="banner">
  Encontre o melhor preço 💊
</div>

<div class="container">

  <div class="search-box">
    <input type="text" id="search" placeholder="Buscar remédio...">
    <button id="btnBuscar">🔍</button>
  </div>

  <div class="categorias">
    <div class="categoria">💊 Dor</div>
    <div class="categoria">🤒 Febre</div>
    <div class="categoria">💪 Vitaminas</div>
    <div class="categoria">🤧 Gripe</div>
  </div>

  <div id="resultados"></div>

</div>

<script>
const farmacias = [
  {
    nome: "Farmácia Central",
    nota: 4.8,
    tempo: "15-25 min",
    destaque: true
  },
  {
    nome: "Drogaria Saúde",
    nota: 4.5,
    tempo: "20-30 min"
  },
  {
    nome: "Farmácia Popular",
    nota: 4.2,
    tempo: "25-40 min"
  }
];

const produtos = [
  {nome:"Dipirona 500mg", preco:5.99, farmacia:"Farmácia Central", img:"dipirona-500mg-com-10-comprimidos-4720aabb2f.jpg"},
  {nome:"Dipirona 500mg", preco:6.49, farmacia:"Drogaria Saúde", img:"dipirona-500mg-com-10-comprimidos-4720aabb2f.jpg"},
  {nome:"Dipirona 500mg", preco:4.99, farmacia:"Farmácia Popular", img:"dipirona-500mg-com-10-comprimidos-4720aabb2f.jpg"},

  {nome:"Dorflex", preco:12.99, farmacia:"Farmácia Central", img:"https://images.unsplash.com/photo-1588776814546-ec7e64d1c8c6?w=300"},
  {nome:"Dorflex", preco:11.50, farmacia:"Drogaria Saúde", img:"https://images.unsplash.com/photo-1588776814546-ec7e64d1c8c6?w=300"},
  {nome:"Dorflex", preco:13.20, farmacia:"Farmácia Popular", img:"https://images.unsplash.com/photo-1588776814546-ec7e64d1c8c6?w=300"}
];

// 🔍 BUSCA
function buscar(){
  const termo = document.getElementById("search").value.toLowerCase();
  const resultados = document.getElementById("resultados");

  const filtrados = produtos.filter(p => 
    p.nome.toLowerCase().includes(termo)
  );

  const nomesUnicos = [...new Set(filtrados.map(p => p.nome))];

  resultados.innerHTML = "";

  nomesUnicos.forEach(nome => {
    const item = document.createElement("div");
    item.className = "card";

    item.innerHTML = `
      <div class="info">
        <h3>${nome}</h3>
        <p style="color:gray;">Ver preços nas farmácias</p>
      </div>
    `;

    item.onclick = () => abrirFarmacias(nome);

    resultados.appendChild(item);
  });
}

// 🏪 LISTA DE FARMÁCIAS
function abrirFarmacias(nomeProduto){
  const resultados = document.getElementById("resultados");

  resultados.innerHTML = `
    <button onclick="buscar()" style="
      background:#2ecc71;
      color:white;
      border:none;
      padding:10px;
      border-radius:10px;
      margin-bottom:10px;
    ">
      ⬅ Voltar
    </button>

    <h2>${nomeProduto}</h2>
  `;

  farmacias.forEach(f => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="info">
        <h3>${f.nome}</h3>
        <p>⭐ ${f.nota} • ${f.tempo}</p>
        ${f.destaque ? '<span class="badge">Patrocinado</span>' : ''}
      </div>
    `;

    card.onclick = () => abrirProdutosFarmacia(nomeProduto, f.nome);

    resultados.appendChild(card);
  });
}

// 💊 PRODUTOS DA FARMÁCIA
function abrirProdutosFarmacia(nomeProduto, nomeFarmacia){
  const resultados = document.getElementById("resultados");

  const lista = produtos.filter(p => 
    p.nome === nomeProduto && p.farmacia === nomeFarmacia
  );

  resultados.innerHTML = `
    <button onclick="buscar()" style="
      background:#2ecc71;
      color:white;
      border:none;
      padding:10px;
      border-radius:10px;
      margin-bottom:10px;
    ">
      ⬅ Voltar
    </button>

    <h2>${nomeFarmacia}</h2>
  `;

  lista.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.img}">
      <div class="info">
        <h3>${p.nome}</h3>
        <p class="price">R$ ${p.preco.toFixed(2)}</p>
        <a class="btn" target="_blank"
           href="https://wa.me/?text=Olá, quero ${p.nome}">
           Comprar
        </a>
      </div>
    `;

    resultados.appendChild(card);
  });
}

// eventos
document.getElementById("search").addEventListener("input", buscar);
document.getElementById("btnBuscar").addEventListener("click", buscar);

function buscar(){
  const termo = document.getElementById("search").value.toLowerCase();
  const resultados = document.getElementById("resultados");

  const filtrados = produtos
    .filter(p => p.nome.toLowerCase().includes(termo))
    .sort((a, b) => a.preco - b.preco);

  const fragment = document.createDocumentFragment();

  filtrados.forEach((p, index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.addEventListener("click", () => {
      abrirProduto(p.nome);
    });

    card.innerHTML = `
      <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150'">
      <div class="info">
        <h3>${p.nome}</h3>
        <p class="price">R$ ${p.preco.toFixed(2)}</p>
        <p>${p.farmacia}</p>
        <p style="font-size:12px;color:gray;">Entrega rápida 🚀</p>
        ${index === 0 ? '<span class="badge">🔥 Melhor preço</span>' : ''}
        <a class="btn" target="_blank" rel="noopener noreferrer"
           onclick="event.stopPropagation()"
           href="${p.whatsapp}?text=Olá, vi ${p.nome} no BuscaFarma">
           Comprar
        </a>
      </div>
    `;

    card.style.opacity = "0";
    card.style.transform = "translateY(10px)";

    setTimeout(() => {
      card.style.transition = "0.3s";
      card.style.opacity = "1";
      card.style.transform = "translateY(0)";
    }, 100);

    fragment.appendChild(card);
  });

  resultados.innerHTML = "";
  resultados.appendChild(fragment);
}

function abrirProduto(nomeProduto){
  const resultados = document.getElementById("resultados");

  const lista = produtos
    .filter(p => p.nome === nomeProduto)
    .sort((a, b) => a.preco - b.preco);

  const fragment = document.createDocumentFragment();

  lista.forEach((p, index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.img}">
      <div class="info">
        <h3>${p.nome}</h3>
        <p class="price">R$ ${p.preco.toFixed(2)}</p>
        <p>${p.farmacia}</p>
        ${index === 0 ? '<span class="badge">🔥 Melhor preço</span>' : ''}
        <a class="btn" target="_blank"
           href="${p.whatsapp}?text=Olá, vi ${p.nome} no BuscaFarma">
           Comprar
        </a>
      </div>
    `;

    fragment.appendChild(card);
  });

  resultados.innerHTML = `
    <button onclick="buscar()" style="
      background:#2ecc71;
      color:white;
      border:none;
      padding:10px;
      border-radius:10px;
      margin-bottom:10px;
    ">
      ⬅ Voltar
    </button>

    <h2>${nomeProduto}</h2>
    <p style="color:gray;">Comparando preços em várias farmácias</p>
  `;

  resultados.appendChild(fragment);
}

document.getElementById("search").addEventListener("input", buscar);
document.getElementById("btnBuscar").addEventListener("click", buscar);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}
</script>

</body>
</html>
